<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR.js · 3D Model</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* FIX: Removed flexbox and solid background. AR.js requires an unstyled, 
       transparent body to properly size and display the injected webcam <video> */
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      background-color: transparent;
    }

    /* ── HUD top bar ─────────────────────────────────── */
    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent);
      pointer-events: none;
    }

    #title {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #b0b0cc;
      /* Lightened for better contrast */
    }

    #status {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: #9090b0;
      /* Lightened for better contrast */
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ff4444;
      transition: background 0.4s;
    }

    #status-dot.found {
      background: #44ff88;
    }

    /* ── Scanner panel (shown by default, centred) ────── */
    #scanner-panel {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(13, 13, 20, 0.4);
      /* Moved the dark background here to be semi-transparent */
      transition: opacity 0.6s ease;
    }

    #scanner-panel.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #scan-frame {
      width: 160px;
      height: 160px;
      position: relative;
    }

    /* Corner brackets */
    #scan-frame::before,
    #scan-frame::after,
    .corner-br,
    .corner-bl {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: #5a64ff;
      border-style: solid;
    }

    #scan-frame::before {
      top: 0;
      left: 0;
      border-width: 2px 0 0 2px;
      border-radius: 4px 0 0 0;
    }

    #scan-frame::after {
      top: 0;
      right: 0;
      border-width: 2px 2px 0 0;
      border-radius: 0 4px 0 0;
    }

    .corner-br {
      bottom: 0;
      right: 0;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 4px 0;
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: #5a64ff;
      border-style: solid;
    }

    .corner-bl {
      bottom: 0;
      left: 0;
      border-width: 0 0 2px 2px;
      border-radius: 0 0 0 4px;
      position: absolute;
      width: 22px;
      height: 22px;
      border-color: #5a64ff;
      border-style: solid;
    }

    /* Sweeping scan line */
    #scan-line {
      position: absolute;
      left: 6px;
      right: 6px;
      height: 1px;
      background: linear-gradient(to right, transparent, #5a64ff, transparent);
      box-shadow: 0 0 8px #5a64ff;
      animation: sweep 1.8s ease-in-out infinite;
    }

    @keyframes sweep {
      0% {
        top: 8px;
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        top: 148px;
        opacity: 0;
      }
    }

    #scan-title {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #b0b0cc;
    }

    #scan-sub {
      font-size: 0.56rem;
      letter-spacing: 0.1em;
      color: #9090b0;
      text-align: center;
      line-height: 1.8;
    }

    #scan-sub a {
      color: #5a64ff;
      text-decoration: none;
    }

    /* ── AR scene (hidden until marker found) ─────────── */
    /* FIX: Changed inset to top/left/width/height absolute positioning */
    #ar-viewport {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #ar-viewport.visible {
      opacity: 1;
      pointer-events: all;
    }

    #ar-viewport a-scene,
    #ar-viewport canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Drag hint ────────────────────────────────────── */
    #drag-hint {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(10, 10, 20, 0.8);
      border: 1px solid #1e1e40;
      border-radius: 99px;
      padding: 7px 18px;
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      color: #b0b0cc;
      opacity: 0;
      transition: opacity 0.5s;
      white-space: nowrap;
    }

    #drag-hint.visible {
      opacity: 1;
    }

    #drag-hint svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: #5a64ff;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .a-enter-vr-button,
    .a-orientation-modal {
      display: none !important;
    }
  </style>
</head>

<body>

  <div id="top-bar">
    <div id="title">AR.js · 3D Renderer</div>
    <div id="status">
      <div id="status-dot"></div>
      <span id="status-text">Searching for marker…</span>
    </div>
  </div>

  <div id="scanner-panel">
    <div id="scan-frame">
      <div id="scan-line"></div>
      <div class="corner-br"></div>
      <div class="corner-bl"></div>
    </div>
    <div id="scan-title">Point camera at Barcode 5</div>
    <div id="scan-sub">
      Print or open on another screen<br>
      <a href="marker.html" target="_blank">View Barcode</a>
    </div>
  </div>

  <div id="ar-viewport">
    <a-scene embedded
      arjs="sourceType: webcam; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      renderer="antialias: true; logarithmicDepthBuffer: true; colorManagement: true;" vr-mode-ui="enabled: false">

      <a-marker type="barcode" value="5" id="custom-marker" smooth="true" smoothCount="10" smoothTolerance="0.01"
        smoothThreshold="2">

        <a-entity id="cube-rig" rotation="0 0 0" position="0 0.75 0">

          <a-box position="0 0 0" width="1.2" height="1.2" depth="1.2"
            material="color: #5a64ff; metalness: 0.4; roughness: 0.25; shader: standard"
            shadow="cast: true; receive: false"
            animation__bob="property: position; from: 0 0 0; to: 0 0.2 0; loop: true; dur: 1800; dir: alternate; easing: easeInOutSine"
            animation__rot="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"></a-box>

          <a-box position="0 0 0" width="1.22" height="1.22" depth="1.22"
            material="color: #8888ff; wireframe: true; opacity: 0.1; transparent: true; shader: flat"
            animation__bob="property: position; from: 0 0 0; to: 0 0.2 0; loop: true; dur: 1800; dir: alternate; easing: easeInOutSine"></a-box>

        </a-entity>



        <a-torus position="0 0.01 0" rotation="-90 0 0" radius="0.7" radius-tubular="0.01"
          material="color: #5a64ff; emissive: #5a64ff; emissiveIntensity: 0.6; shader: flat; opacity: 0.5; transparent: true"
          animation__pulse="property: material.opacity; from: 0.5; to: 0.1; loop: true; dur: 1800; dir: alternate; easing: easeInOutSine"></a-torus>

        <a-light type="ambient" color="#ffffff" intensity="0.3"></a-light>
        <a-light type="point" color="#ffeedd" intensity="1.6" distance="6" position="2 3 2"
          cast-shadow="true"></a-light>
        <a-light type="point" color="#4466ff" intensity="0.7" distance="6" position="-2 1 -2"></a-light>
        <a-light type="directional" color="#aaaaff" intensity="0.3" position="0 4 -2"></a-light>

      </a-marker>

      <a-entity camera></a-entity>

    </a-scene>
  </div>

  <div id="drag-hint">
    <svg viewBox="0 0 24 24">
      <path
        d="M8 10V6a2 2 0 1 1 4 0v4m0 0V5a2 2 0 1 1 4 0v5m0 0v-2a2 2 0 1 1 4 0v6a6 6 0 0 1-6 6h-2a6 6 0 0 1-6-6v-3a2 2 0 1 1 4 0" />
    </svg>
    DRAG TO ROTATE &middot; PINCH TO ZOOM
  </div>

  <script>
    const marker = document.querySelector('#custom-marker');
    const dot = document.getElementById('status-dot');
    const statusTxt = document.getElementById('status-text');
    const scannerPanel = document.getElementById('scanner-panel');
    const arViewport = document.getElementById('ar-viewport');
    const dragHint = document.getElementById('drag-hint');
    const cubeRig = document.getElementById('cube-rig');

    // ── Swap scanner ↔ cube on marker found/lost ──────────
    marker.addEventListener('markerFound', () => {
      dot.classList.add('found');
      statusTxt.textContent = 'Marker detected ✓';
      scannerPanel.classList.add('hidden');     // hide scanner
      arViewport.classList.add('visible');      // show cube
      dragHint.classList.add('visible');
    });

    marker.addEventListener('markerLost', () => {
      dot.classList.remove('found');
      statusTxt.textContent = 'Searching for marker…';
      scannerPanel.classList.remove('hidden');  // show scanner again
      arViewport.classList.remove('visible');   // hide cube
      dragHint.classList.remove('visible');
    });

    // ── Manual drag-to-rotate & Pinch-to-zoom ─────────────
    let isDragging = false;
    let prevX = 0, prevY = 0;
    let rotX = 0, rotY = 0;
    let velX = 0, velY = 0;
    let currentScale = 1;
    let initialPinchDistance = null;
    let initialScale = 1;

    const DAMPING = 0.92; // Smoother damping
    const DRAG_SPEED = 0.4;
    const ZOOM_SPEED = 0.001;
    const MIN_SCALE = 0.3;
    const MAX_SCALE = 3.0;

    // Mouse events for rotation
    arViewport.addEventListener('mousedown', e => {
      isDragging = true;
      prevX = e.clientX; prevY = e.clientY;
      velX = velY = 0;
    });

    document.addEventListener('mouseup', () => {isDragging = false;});

    document.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - prevX;
      const dy = e.clientY - prevY;
      velY = -dx * DRAG_SPEED;
      velX = dy * DRAG_SPEED;
      rotY += velY; rotX += velX;
      rotX = Math.max(-80, Math.min(80, rotX));
      cubeRig.setAttribute('rotation', `${rotX} ${rotY} 0`);
      prevX = e.clientX; prevY = e.clientY;
    });

    // Mouse wheel for zooming
    arViewport.addEventListener('wheel', e => {
      e.preventDefault();
      currentScale -= e.deltaY * ZOOM_SPEED;
      currentScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, currentScale));
      cubeRig.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
    }, { passive: false });

    // Touch events for rotation & pinch-to-zoom
    arViewport.addEventListener('touchstart', e => {
      if (e.touches.length === 1) {
        isDragging = true;
        prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
        velX = velY = 0;
      } else if (e.touches.length === 2) {
        isDragging = false; // Stop rotating when pinching
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        initialPinchDistance = Math.hypot(dx, dy);
        initialScale = currentScale;
      }
    }, {passive: false});

    document.addEventListener('touchend', e => {
      if (e.touches.length === 0) isDragging = false;
      initialPinchDistance = null;
    });

    document.addEventListener('touchmove', e => {
      if (e.touches.length === 1 && isDragging) {
        const dx = e.touches[0].clientX - prevX;
        const dy = e.touches[0].clientY - prevY;
        velY = -dx * DRAG_SPEED;
        velX = dy * DRAG_SPEED;
        rotY += velY; rotX += velX;
        rotX = Math.max(-80, Math.min(80, rotX));
        cubeRig.setAttribute('rotation', `${rotX} ${rotY} 0`);
        prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
      } else if (e.touches.length === 2 && initialPinchDistance !== null) {
        e.preventDefault(); // Prevent page scroll/zoom
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        const pinchRatio = dist / initialPinchDistance;
        currentScale = initialScale * pinchRatio;
        currentScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, currentScale));
        cubeRig.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
      }
    }, {passive: false});

    // ── Smooth Inertia Animation ──────────────────────────
    let lastTime = performance.now();
    (function inertiaLoop(now) {
      const dt = now - lastTime;
      lastTime = now;
      
      if (!isDragging && (Math.abs(velX) > 0.01 || Math.abs(velY) > 0.01)) {
        // Adjust damping based on dt so it's consistent across refresh rates
        const timeScale = dt / 16.666; 
        const frameDamping = Math.pow(DAMPING, timeScale);
        velX *= frameDamping; velY *= frameDamping;
        rotY += velY; rotX += velX;
        rotX = Math.max(-80, Math.min(80, rotX));
        cubeRig.setAttribute('rotation', `${rotX} ${rotY} 0`);
      }
      requestAnimationFrame(inertiaLoop);
    })(performance.now());
  </script>

</body>

</html>
